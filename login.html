<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⛧ AUTH ⛧</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:linear-gradient(135deg,#0a0f1e,#0d1225);font-family:'Courier New',monospace;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .login-card{background:rgba(10,10,10,.95);border:2px solid #0f0;border-radius:24px;padding:40px;max-width:400px;width:100%;box-shadow:0 0 40px rgba(0,255,65,.2)}
        .login-title{text-align:center;color:#0f0;font-size:2rem;margin-bottom:20px;text-shadow:0 0 10px #0f0}
        .login-title span{color:#f04}
        .lang-selector{display:flex;justify-content:center;gap:15px;margin-bottom:30px}
        .lang-btn{background:0 0;border:1px solid #0f0;color:#0f0;padding:5px 20px;cursor:pointer;border-radius:20px}
        .lang-btn.active{background:#0f0;color:#000}
        .input-group input{width:100%;background:#1f1f1f;border:1px solid #0f0;color:#0f0;padding:14px 18px;font-family:monospace;border-radius:12px;margin-bottom:15px}
        .login-btn{width:100%;background:#0f0;color:#000;border:none;padding:14px;font-weight:bold;cursor:pointer;border-radius:40px;font-size:1rem}
        .register-link{text-align:center;margin-top:25px;color:#888}
        .register-link a{color:#f04;cursor:pointer}
        .error-msg{color:#f04;text-align:center;margin-top:15px;font-size:.75rem}
        .info-text{color:#0f0;text-align:center;margin-top:15px;font-size:.7rem}
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-title">⛧ <span>KURABI</span>_AUTH ⛧</div>
    <div class="lang-selector">
        <button class="lang-btn active" data-lang="en">🇬🇧 EN</button>
        <button class="lang-btn" data-lang="ar">🇸🇦 AR</button>
    </div>
    <div class="input-group"><input type="email" id="email" placeholder="EMAIL"></div>
    <div class="input-group"><input type="password" id="password" placeholder="PASSWORD"></div>
    <button class="login-btn" id="loginBtn">⟳ LOGIN</button>
    <div class="register-link"><span id="registerText">DON'T HAVE AN ACCOUNT?</span> <a id="contactBtn">📞 CONTACT</a></div>
    <div id="errorMsg" class="error-msg"></div>
    <div id="infoText" class="info-text"></div>
</div>
<script src="config.js"></script>
<script type="importmap">
{"imports":{"firebase/app":"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js","firebase/auth":"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js","firebase/firestore":"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"}}
</script>
<script type="module">
import{initializeApp}from"firebase/app";import{getAuth,signInWithEmailAndPassword,setPersistence,browserLocalPersistence,browserSessionPersistence}from"firebase/auth";import{getFirestore,doc,getDoc,setDoc}from"firebase/firestore";const app=initializeApp(window.FIREBASE_CONFIG);const auth=getAuth(app);const db=getFirestore(app);const t={en:{login:"⟳ LOGIN",contact:"📞 CONTACT",reg:"DON'T HAVE AN ACCOUNT?",errReq:"Enter email & password!",errInv:"Invalid credentials!",errBan:"⛧ ACCOUNT BANNED!",success:"✅ Success! Redirecting...",loading:"⟳ Logging in..."},ar:{login:"⟳ تسجيل الدخول",contact:"📞 اتصل بنا",reg:"ليس لديك حساب؟",errReq:"الرجاء إدخال البريد وكلمة المرور!",errInv:"بيانات غير صحيحة!",errBan:"⛧ تم حظر حسابك!",success:"✅ تم التسجيل! جاري التحويل...",loading:"⟳ جاري التسجيل..."}};let lang=localStorage.getItem('lang')||'en';function apply(){const L=t[lang];document.getElementById('loginBtn').innerHTML=L.login;document.getElementById('registerText').innerHTML=L.reg;document.getElementById('contactBtn').innerHTML=L.contact;document.querySelectorAll('.lang-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.lang===lang));document.body.dir=lang==='ar'?'rtl':'ltr'}document.querySelectorAll('.lang-btn').forEach(btn=>{btn.onclick=()=>{lang=btn.dataset.lang;localStorage.setItem('lang',lang);apply()}});document.getElementById('contactBtn').onclick=()=>window.open('https://t.me/kodlamaogrencom','_blank');document.getElementById('loginBtn').onclick=async()=>{const email=document.getElementById('email').value.trim();const pwd=document.getElementById('password').value.trim();const err=document.getElementById('errorMsg');const info=document.getElementById('infoText');const L=t[lang];if(!email||!pwd){err.innerText=L.errReq;return}err.innerText='';info.innerText=L.loading;document.getElementById('loginBtn').disabled=true;try{await setPersistence(auth,browserLocalPersistence);const cred=await signInWithEmailAndPassword(auth,email,pwd);const user=cred.user;const userDoc=await getDoc(doc(db,"users",user.uid));let role='user';if(userDoc.exists()){if(userDoc.data().banned===true){err.innerText=L.errBan;info.innerText='';document.getElementById('loginBtn').disabled=false;return}role=userDoc.data().role||'user'}else{await setDoc(doc(db,"users",user.uid),{email:email,role:'user',createdAt:new Date().toISOString(),banned:false})}sessionStorage.setItem('user',JSON.stringify({uid:user.uid,email:user.email,role:role}));info.innerText=L.success;setTimeout(()=>{window.location.href=role==='superadmin'?'superadmin.html':'admin.html'},1000)}catch(e){err.innerText=L.errInv;info.innerText='';document.getElementById('loginBtn').disabled=false}};apply();
</script>
</body>
</html>
